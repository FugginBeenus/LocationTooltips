name: Publish release

# Publishes the mod to Modrinth AND creates a GitHub Release when a version tag (vX.Y.Z)
# is pushed, or on demand via the "Run workflow" button (Actions tab).
#
# Setup required once: add a repository secret named MODRINTH_TOKEN
# (Settings -> Secrets and variables -> Actions -> New repository secret) holding a
# Modrinth personal access token. For the Modrinth upload it needs the "Create versions"
# scope; to also auto-set the project environment it needs "Write projects".
#
# Release flow for future versions:
#   1. bump `version=` in gradle.properties
#   2. add CHANGELOG-<version>.md with the release notes
#   3. git commit, then: git tag vX.Y.Z && git push origin vX.Y.Z

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # needed to create the GitHub Release

env:
  MODRINTH_PROJECT_ID: EEaD8a3s

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve version and changelog
        run: |
          VERSION=$(grep '^version=' gradle.properties | cut -d= -f2)
          echo "Publishing version: $VERSION"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

          # On a tag push, ensure the tag matches the project version.
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME#v}"
            if [ "$TAG" != "$VERSION" ]; then
              echo "::error::Tag ${GITHUB_REF_NAME} does not match gradle.properties version ${VERSION}. Bump gradle.properties first."
              exit 1
            fi
          fi

          # Use CHANGELOG-<version>.md if present, otherwise a simple default.
          if [ -f "CHANGELOG-${VERSION}.md" ]; then
            {
              echo "CHANGELOG<<__LT_EOF__"
              cat "CHANGELOG-${VERSION}.md"
              echo "__LT_EOF__"
            } >> "$GITHUB_ENV"
          else
            echo "CHANGELOG=Release ${VERSION}" >> "$GITHUB_ENV"
          fi

      - name: Publish to Modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: ./gradlew modrinth --no-daemon --stacktrace

      - name: Set Modrinth project environment (client required, server optional)
        continue-on-error: true   # don't fail the release if the token lacks "Write projects"
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          code=$(curl -sS -o /tmp/mr.txt -w '%{http_code}' -X PATCH \
            "https://api.modrinth.com/v2/project/${MODRINTH_PROJECT_ID}" \
            -H "Authorization: ${MODRINTH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"client_side":"required","server_side":"optional"}')
          echo "Modrinth PATCH status: $code"
          if [ "$code" = "204" ]; then
            echo "Environment set: client required, server optional."
          else
            echo "::warning::Could not set environment (HTTP $code). Set it manually on the project page. Response: $(cat /tmp/mr.txt)"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Location Tooltip ${{ env.VERSION }}
          body_path: CHANGELOG-${{ env.VERSION }}.md
          files: build/libs/locationtooltip-${{ env.VERSION }}.jar
          fail_on_unmatched_files: false
